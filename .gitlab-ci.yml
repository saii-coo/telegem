
image: ruby:3.2

stages:
  - test
  - build

before_script:
  - ruby --version
  - gem install httpx concurrent-ruby async rspec

test:
  stage: test
  script:
    - rspec test/spec.rb --require test/spec_helper.rb

build:
  stage: build
  script:
    - gem build telegem.gemspec
  artifacts:
    paths:
      - telegem-*.gem
  only:
    - tags